[project]
name = "shared"
version = "0.1.0"
description = "Shared infra utilities for shop-monorepo services"
requires-python = ">=3.13,<3.14"
dependencies = [
    "pydantic>=2.12.5",
    "pyjwt[crypto]>=2.11.0",
    "cryptography>=46.0.5",
    "starlette>=0.46.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/shared"]
