<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-stage">
  <div class="label" style="margin-bottom: 14px">Surface distribution — at least one of the first two scrolls on any landing surface should be dark.</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 12px; height: 200px">
    <div style="background: var(--ink); color: var(--snow); padding: 18px; display: flex; flex-direction: column; justify-content: space-between">
      <span class="k-caps" style="font-size: 9px; color: rgba(255,255,255,0.55)">Hero · feature</span>
      <span style="font-family: var(--font-display); font-weight: 300; font-size: 32px; line-height: 1; letter-spacing: 0.04em">Ink</span>
    </div>
    <div style="background: var(--graphite); color: var(--snow); padding: 18px; display: flex; flex-direction: column; justify-content: space-between">
      <span class="k-caps" style="font-size: 9px; color: rgba(255,255,255,0.55)">Card on ink</span>
      <span style="font-family: var(--font-display); font-weight: 300; font-size: 32px; line-height: 1; letter-spacing: 0.04em">Graphite</span>
    </div>
    <div style="background: var(--paper); color: var(--ink); padding: 18px; display: flex; flex-direction: column; justify-content: space-between; border: 1px solid var(--line)">
      <span class="k-caps" style="font-size: 9px; color: var(--smoke)">Catalog · PDP</span>
      <span style="font-family: var(--font-display); font-weight: 300; font-size: 32px; line-height: 1; letter-spacing: 0.04em">Paper</span>
    </div>
    <div style="background: var(--bone); color: var(--ink); padding: 18px; display: flex; flex-direction: column; justify-content: space-between">
      <span class="k-caps" style="font-size: 9px; color: var(--smoke)">Alt surface</span>
      <span style="font-family: var(--font-display); font-weight: 300; font-size: 32px; line-height: 1; letter-spacing: 0.04em">Bone</span>
    </div>
  </div>
</div>
</body></html>
