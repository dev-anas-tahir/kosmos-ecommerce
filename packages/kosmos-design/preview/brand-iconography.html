<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .row { display:flex; gap: 28px; align-items: center; }
  .word { font-family: var(--font-sans); font-size: 13px; letter-spacing: 0.18em; text-transform: uppercase; }
  .icons { display:flex; gap: 22px; align-items: center; padding: 14px 18px; border: 1px solid var(--line); }
  .icons svg { width: 18px; height: 18px; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="label" style="margin-bottom: 14px">Kosmos uses words over icons. Glyphs appear only for close, plus/minus, social, and chevrons.</div>
  <div class="row">
    <div style="display:flex; gap: 28px">
      <div class="word">Bag (1)</div>
      <div class="word">Search</div>
      <div class="word">Account</div>
    </div>
    <div class="icons" aria-label="utility glyphs">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><line x1="4" y1="4" x2="20" y2="20"/><line x1="20" y1="4" x2="4" y2="20"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><line x1="4" y1="12" x2="20" y2="12"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><line x1="4" y1="12" x2="20" y2="12"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><polyline points="9 6 15 12 9 18"/></svg>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.25"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>
  <div class="label" style="margin-top: 14px">1px stroke, monoline, 24px viewbox, currentColor. No fills, no two‑tone, no emoji.</div>
</div>
</body></html>
