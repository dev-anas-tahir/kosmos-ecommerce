<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px 32px; max-width: 600px; }
  .field { display:flex; flex-direction:column; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="grid">
    <div class="field">
      <label class="k-label">Email</label>
      <input class="k-input" type="email" placeholder="you@kosmos.com" />
    </div>
    <div class="field">
      <label class="k-label">Size</label>
      <select class="k-select">
        <option>30 ml — € 140</option>
        <option>50 ml — € 220</option>
        <option>100 ml — € 320</option>
      </select>
    </div>
    <div class="field">
      <label class="k-label">Search</label>
      <input class="k-input" type="search" placeholder="What do you seek?" />
    </div>
    <div class="field">
      <label class="k-label">Postal code</label>
      <input class="k-input" type="text" value="75008" style="border-color: var(--ink)" />
    </div>
  </div>
</div>
</body></html>
