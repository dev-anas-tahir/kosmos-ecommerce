<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-stage">
  <div class="row gap-4">
    <div class="swatch swatch--ink" style="background:var(--ink); color:var(--snow); flex:1">
      <div class="swatch__name">Ink</div>
      <div class="swatch__hex">#0A0A0A</div>
    </div>
    <div class="swatch" style="background:var(--graphite); color:var(--snow); flex:1; border-color:transparent">
      <div class="swatch__name">Graphite</div>
      <div class="swatch__hex">#25221E</div>
    </div>
    <div class="swatch" style="background:var(--ash); color:var(--snow); flex:1; border-color:transparent">
      <div class="swatch__name">Ash</div>
      <div class="swatch__hex">#161310</div>
    </div>
    <div class="swatch" style="background:var(--paper); color:var(--ink); flex:1">
      <div class="swatch__name">Paper</div>
      <div class="swatch__hex">#E8E4D8</div>
    </div>
    <div class="swatch" style="background:var(--snow); color:var(--ink); flex:1">
      <div class="swatch__name">Snow</div>
      <div class="swatch__hex">#F2EEE4</div>
    </div>
  </div>
  <div style="margin-top:14px" class="label">Anchor palette — three darks, two papers. Feature surfaces run on ink or graphite.</div>
</div>
</body></html>
