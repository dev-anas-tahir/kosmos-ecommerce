<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  .grid { display: flex; align-items: flex-end; gap: 14px; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { background: var(--ink); width: 32px; }
  .tok { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--smoke); }
  .px { font-family: var(--font-sans); font-size: 10px; color: var(--ink); }
</style>
</head>
<body>
<div class="card-stage">
  <div class="grid">
    <div class="cell"><div class="box" style="height:4px"></div><div class="tok">1</div><div class="px">4</div></div>
    <div class="cell"><div class="box" style="height:8px"></div><div class="tok">2</div><div class="px">8</div></div>
    <div class="cell"><div class="box" style="height:12px"></div><div class="tok">3</div><div class="px">12</div></div>
    <div class="cell"><div class="box" style="height:16px"></div><div class="tok">4</div><div class="px">16</div></div>
    <div class="cell"><div class="box" style="height:24px"></div><div class="tok">5</div><div class="px">24</div></div>
    <div class="cell"><div class="box" style="height:40px"></div><div class="tok">6</div><div class="px">40</div></div>
    <div class="cell"><div class="box" style="height:64px"></div><div class="tok">7</div><div class="px">64</div></div>
    <div class="cell"><div class="box" style="height:96px"></div><div class="tok">8</div><div class="px">96</div></div>
    <div class="cell"><div class="box" style="height:120px"></div><div class="tok">9</div><div class="px">160</div></div>
    <div class="cell"><div class="box" style="height:140px"></div><div class="tok">10</div><div class="px">240</div></div>
  </div>
  <div style="margin-top:14px" class="label">8px base. Sections breathe at scale 8–10 (96–240px vertical air).</div>
</div>
</body></html>
