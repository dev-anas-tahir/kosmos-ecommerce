<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card-stage">
  <div class="row gap-4">
    <div class="swatch" style="background:var(--smoke); color:var(--snow); flex:1; border-color:transparent">
      <div class="swatch__name">Smoke</div>
      <div class="swatch__hex">#6F6962</div>
    </div>
    <div class="swatch" style="background:var(--stone); color:var(--ink); flex:1; border-color:transparent">
      <div class="swatch__name">Stone</div>
      <div class="swatch__hex">#B6AFA1</div>
    </div>
    <div class="swatch" style="background:var(--bone); color:var(--ink); flex:1">
      <div class="swatch__name">Bone</div>
      <div class="swatch__hex">#D5CEBE</div>
    </div>
    <div class="swatch" style="background:var(--line); color:var(--ink); flex:1; border-color:transparent">
      <div class="swatch__name">Line</div>
      <div class="swatch__hex">#C7C0AF</div>
    </div>
  </div>
  <div style="margin-top:14px" class="label">Cool warm‑neutrals between the anchors. Stone is the new mid‑tone that keeps paper from dominating.</div>
</div>
</body></html>
