<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; background: var(--ink); color: var(--cream); }
  .footer {
    display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr;
    gap: 48px; padding: 48px;
  }
  .group h6 { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(255,255,255,0.55); margin: 0 0 16px 0; font-weight: 500; }
  .group a { display: block; font-family: var(--font-sans); font-size: 14px; color: var(--cream); margin-bottom: 10px; }
  .mark { font-family: var(--font-display); font-weight: 300; font-size: 36px; letter-spacing: 0.18em; line-height: 1; margin-bottom: 18px; }
  .addr { font-family: var(--font-sans); font-size: 13px; line-height: 1.6; color: rgba(255,255,255,0.7); }
</style>
</head>
<body>
<div class="card-stage">
  <div class="footer">
    <div>
      <div class="mark">KOSMOS</div>
      <div class="addr">8, rue du Faubourg<br/>Saint‑Honoré · Paris VIII</div>
    </div>
    <div class="group">
      <h6>Shop</h6>
      <a>Fragrance</a><a>Skin</a><a>Lipstick</a>
    </div>
    <div class="group">
      <h6>Maison</h6>
      <a>The house</a><a>Boutiques</a><a>Journal</a>
    </div>
    <div class="group">
      <h6>Care</h6>
      <a>Contact</a><a>Shipping</a><a>Returns</a>
    </div>
  </div>
</div>
</body></html>
