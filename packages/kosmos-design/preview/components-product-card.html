<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .stage { display: flex; align-items: stretch; height: 320px; }
  .img { width: 280px; background: #1a1612 url("https://images.unsplash.com/photo-1541643600914-78b084683601?auto=format&fit=crop&w=600&q=80") center/cover no-repeat; }
  .meta { padding: 28px 32px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .name { font-family: var(--font-display); font-weight: 300; font-size: 36px; line-height: 1.05; letter-spacing: -0.01em; }
  .row { display: flex; justify-content: space-between; align-items: baseline; }
  .price { font-family: var(--font-sans); font-size: 16px; font-weight: 300; letter-spacing: 0.04em; }
  .eyebrow { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--smoke); margin-bottom: 12px; }
  .meta a { font-family: var(--font-sans); font-size: 12px; letter-spacing: 0.18em; text-transform: uppercase; border-bottom: 1px solid var(--ink); padding-bottom: 4px; align-self: flex-start; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="stage">
    <div class="img"></div>
    <div class="meta">
      <div>
        <div class="eyebrow">Fragrance · No. 04</div>
        <div class="name">Noir,<br/>undone</div>
      </div>
      <div class="row">
        <span class="price">€ 220</span>
        <a href="#">View</a>
      </div>
    </div>
  </div>
</div>
</body></html>
