<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .stage { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1px; background: var(--line); }
  .tile { aspect-ratio: 4/5; background-size: cover; background-position: center; position: relative; background-color: var(--ash); }
  .tile::after { content: ""; position: absolute; inset: 0; background: linear-gradient(rgba(10,10,10,0.25), rgba(10,10,10,0.75)); }
  .cap { z-index: 1; }
  .cap { position:absolute; left: 14px; bottom: 12px; color: var(--cream); font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="stage">
    <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1547887537-6158d64c35b3?auto=format&fit=crop&w=600&q=80')"><div class="cap">Lipstick · bullet on ash</div></div>
    <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1592945403244-b3fbafd7f539?auto=format&fit=crop&w=600&q=80')"><div class="cap">Fragrance · amber liquid</div></div>
    <div class="tile" style="background-image:url('https://images.unsplash.com/photo-1556228720-195a672e8a03?auto=format&fit=crop&w=600&q=80')"><div class="cap">Skin · single light source</div></div>
  </div>
</div>
</body></html>
