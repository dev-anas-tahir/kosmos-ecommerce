<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .stage { display: grid; grid-template-columns: 1fr 1fr; }
  .panel { padding: 40px 32px; display:flex; align-items:center; justify-content:center; min-height: 200px; }
  .panel--cream { background: var(--cream); color: var(--ink); }
  .panel--ink { background: var(--ink); color: var(--cream); }
  .panel img { width: 70%; max-width: 360px; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="stage">
    <div class="panel panel--cream"><img src="../assets/wordmark.svg" alt=""/></div>
    <div class="panel panel--ink"><img src="../assets/wordmark.svg" alt=""/></div>
  </div>
</div>
</body></html>
