<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 22px 48px;
    background: var(--cream);
    border-bottom: 1px solid var(--line);
    height: 76px;
  }
  .nav__links { display: flex; gap: 36px; }
  .nav__links a { font-family: var(--font-sans); font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; color: var(--ink); }
  .nav__mark { font-family: var(--font-display); font-weight: 300; font-size: 26px; letter-spacing: 0.32em; }
  .nav__util { display: flex; gap: 24px; }
  .nav__util a { font-family: var(--font-sans); font-size: 12px; text-transform: uppercase; letter-spacing: 0.18em; }
  .label { padding: 16px 48px 0; }
</style>
</head>
<body>
<div class="card-stage">
  <div class="nav">
    <div class="nav__links">
      <a href="#">Fragrance</a>
      <a href="#">Skin</a>
      <a href="#">Lipstick</a>
      <a href="#">The Maison</a>
    </div>
    <div class="nav__mark">KOSMOS</div>
    <div class="nav__util">
      <a href="#">Search</a>
      <a href="#">Account</a>
      <a href="#">Bag (0)</a>
    </div>
  </div>
  <div class="label">Top navigation · centered wordmark · words over icons · 76px tall · 1px hairline divider.</div>
</div>
</body></html>
