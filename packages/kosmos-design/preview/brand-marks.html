<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css">
<style>
  body { padding: 0; }
  .stage { display: grid; grid-template-columns: 1fr 1fr 1fr; }
  .panel { padding: 28px; display:flex; flex-direction: column; align-items:center; justify-content:center; gap: 14px; min-height: 220px; }
  .panel--ink { background: var(--ink); color: var(--cream); }
  .panel img { width: 96px; height: 96px; }
  .panel--ink img { filter: invert(1) brightness(1.6); }
  .lbl { font-family: var(--font-sans); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; }
  .panel--ink .lbl { color: rgba(255,255,255,0.55); }
  .panel:not(.panel--ink) .lbl { color: var(--smoke); }
</style>
</head>
<body>
<div class="card-stage">
  <div class="stage">
    <div class="panel"><img src="../assets/monogram.svg" alt=""/><div class="lbl">Monogram · K</div></div>
    <div class="panel panel--ink"><img src="../assets/seal.svg" alt=""/><div class="lbl">Seal · maison de beauté</div></div>
    <div class="panel"><img src="../assets/wordmark-condensed.svg" alt=""/><div class="lbl">Compact wordmark</div></div>
  </div>
</div>
</body></html>
