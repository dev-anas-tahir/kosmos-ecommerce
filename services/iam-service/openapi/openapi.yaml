openapi: 3.1.0

info:
  title: IAM Service
  version: 1.0.0
  description: |
    Identity and Access Management service for the shop-monorepo platform.

    Provides authentication (JWT RS256, refresh token rotation), fine-grained
    RBAC (role → permission scope keys), and an immutable audit log.

    ## Authentication
    All protected endpoints require a Bearer token in the `Authorization` header.
    Admin endpoints additionally require the `is_super_user` claim to be `true` in the token.

servers:
  - url: http://localhost:8000
    description: Local development

tags:
  - name: jwks
    description: Public key discovery for JWT verification
  - name: auth
    description: Signup, login, token refresh, logout, and current user
  - name: admin
    description: Role and permission management (super user only)

# ─────────────────────────────────────────────────────────────────────────────
# Security schemes
# ─────────────────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: RS256-signed JWT issued by `POST /api/v1/auth/login`

  # ───────────────────────────────────────────────────────────────────────────
  # Reusable schemas
  # ───────────────────────────────────────────────────────────────────────────
  schemas:

    # ── Errors ───────────────────────────────────────────────────────────────

    ErrorDetail:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          description: Human-readable error message

    ValidationError:
      type: object
      required: [detail]
      properties:
        detail:
          type: array
          items:
            type: object
            required: [loc, msg, type]
            properties:
              loc:
                type: array
                items:
                  oneOf:
                    - type: string
                    - type: integer
              msg:
                type: string
              type:
                type: string

    # ── Auth ─────────────────────────────────────────────────────────────────

    SignupRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: john_doe
        password:
          type: string
          description: |
            Must be at least 8 characters and include at least one uppercase
            letter, one digit, and one special character (`!@#$%^&*()_+-=[]{}|;':"<>,.?/`).
          example: "Secret1!"
        email:
          type: string
          format: email
          nullable: true
          example: john@example.com

    UserResponse:
      type: object
      required: [id, username, created_at]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
          nullable: true
        created_at:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: john_doe
        password:
          type: string
          example: "Secret1!"

    TokenResponse:
      type: object
      required: [access_token, token_type]
      properties:
        access_token:
          type: string
          description: RS256-signed JWT. Expires in `ACCESS_TOKEN_EXPIRE_MINUTES` (default 15 min).
        token_type:
          type: string
          enum: [bearer]
          default: bearer

    MeResponse:
      type: object
      required: [id, username, roles, permissions, is_super_user]
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        roles:
          type: array
          items:
            type: string
          example: [viewer, editor]
        permissions:
          type: array
          items:
            type: string
          description: List of `resource:action` scope keys granted to the user via their roles.
          example: [products:read, orders:write]
        is_super_user:
          type: boolean

    # ── RBAC ─────────────────────────────────────────────────────────────────

    RoleCreate:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 3
          maxLength: 100
          example: editor
        description:
          type: string
          nullable: true
          example: Can read and write products

    RoleResponse:
      type: object
      required: [id, name, is_system, created_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        is_system:
          type: boolean
          description: System roles cannot be deleted.
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    PermissionCreate:
      type: object
      required: [resource, action]
      properties:
        resource:
          type: string
          minLength: 1
          maxLength: 100
          example: products
        action:
          type: string
          minLength: 1
          maxLength: 100
          example: read

    RolePermissionResponse:
      type: object
      required: [role_id, permission_id]
      properties:
        role_id:
          type: string
          format: uuid
        permission_id:
          type: string
          format: uuid

    AssignRoleRequest:
      type: object
      required: [role_id]
      properties:
        role_id:
          type: string
          format: uuid

    UserRoleResponse:
      type: object
      required: [user_id, role_id]
      properties:
        user_id:
          type: string
          format: uuid
        role_id:
          type: string
          format: uuid

    # ── Audit ─────────────────────────────────────────────────────────────────

    AuditLogResponse:
      type: object
      required: [id, action, entity_type, created_at]
      properties:
        id:
          type: string
          format: uuid
        actor_id:
          type: string
          format: uuid
          nullable: true
        action:
          type: string
          description: Name of the domain event (e.g. `RoleCreated`, `PermissionGranted`).
          example: RoleCreated
        entity_type:
          type: string
          example: Role
        entity_id:
          type: string
          format: uuid
          nullable: true
        payload:
          type: object
          nullable: true
          additionalProperties: true
          description: Event-specific structured data from `DomainEvent.to_audit_payload()`.
        created_at:
          type: string
          format: date-time

    # ── JWKS ─────────────────────────────────────────────────────────────────

    JwkKey:
      type: object
      required: [kty, use, kid, alg, n, e]
      properties:
        kty:
          type: string
          enum: [RSA]
        use:
          type: string
          enum: [sig]
        kid:
          type: string
          description: First 16 hex chars of the SHA-256 digest of the DER-encoded public key.
        alg:
          type: string
          enum: [RS256]
        n:
          type: string
          description: Base64url-encoded RSA modulus.
        e:
          type: string
          description: Base64url-encoded RSA public exponent.

    JwksResponse:
      type: object
      required: [keys]
      properties:
        keys:
          type: array
          items:
            $ref: "#/components/schemas/JwkKey"

  # ───────────────────────────────────────────────────────────────────────────
  # Reusable responses
  # ───────────────────────────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Missing, expired, or invalid Bearer token.
      headers:
        WWW-Authenticate:
          schema:
            type: string
            example: Bearer
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"

    Forbidden:
      description: Caller is not a super user.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorDetail"

    UnprocessableEntity:
      description: Request body failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationError"

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────
paths:

  # ── JWKS ───────────────────────────────────────────────────────────────────

  /.well-known/jwks.json:
    get:
      tags: [jwks]
      summary: Get JSON Web Key Set
      description: |
        Returns the RSA public key used to verify all access tokens issued by this service.
        Clients can cache this response and use it to verify JWT signatures locally.
      operationId: getJwks
      responses:
        "200":
          description: JWKS document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
              example:
                keys:
                  - kty: RSA
                    use: sig
                    kid: a1b2c3d4e5f67890
                    alg: RS256
                    n: "sHkm9..."
                    e: AQAB
        "500":
          description: Public key not loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  # ── Auth ───────────────────────────────────────────────────────────────────

  /api/v1/auth/signup:
    post:
      tags: [auth]
      summary: Register a new user
      description: |
        Creates a new user account and assigns the default `viewer` role.

        Rate-limited: 20 requests/min per IP.
      operationId: signup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "409":
          description: Username or email already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/v1/auth/login:
    post:
      tags: [auth]
      summary: Authenticate and obtain tokens
      description: |
        Verifies credentials and returns an access token in the response body.
        A `refresh_token` is set as an httpOnly, SameSite=Lax cookie (7-day TTL).

        Rate-limited: 20 requests/min per IP; 5 failed attempts per 5 min per username.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful. `refresh_token` cookie is set.
          headers:
            Set-Cookie:
              description: "`refresh_token=<token>; HttpOnly; SameSite=Lax; Max-Age=604800`"
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Invalid username or password.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/v1/auth/refresh:
    post:
      tags: [auth]
      summary: Rotate refresh token and issue new access token
      description: |
        Consumes the `refresh_token` cookie, validates the JTI against the Redis
        revocation set, and issues a new access token + rotated refresh token cookie.

        Rate-limited: 20 requests/min per IP.
      operationId: refreshToken
      parameters:
        - in: cookie
          name: refresh_token
          required: true
          schema:
            type: string
          description: Opaque refresh token issued by `POST /api/v1/auth/login`.
      responses:
        "200":
          description: New access token issued. Rotated `refresh_token` cookie is set.
          headers:
            Set-Cookie:
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
        "401":
          description: Refresh token is missing, expired, or already revoked.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "429":
          description: Rate limit exceeded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/v1/auth/logout:
    post:
      tags: [auth]
      summary: Revoke tokens and clear session
      description: |
        Adds the access token's JTI to the Redis revocation set and deletes the
        refresh token from Redis. Clears the `refresh_token` cookie.
      operationId: logout
      security:
        - BearerAuth: []
      parameters:
        - in: cookie
          name: refresh_token
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Logged out. `refresh_token` cookie cleared.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/v1/auth/me:
    get:
      tags: [auth]
      summary: Get current user from token
      description: |
        Returns the identity and authorization claims embedded in the Bearer token.
        Does not hit the database — all data is read directly from the JWT payload.
      operationId: getCurrentUser
      security:
        - BearerAuth: []
      responses:
        "200":
          description: Current user details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── RBAC ───────────────────────────────────────────────────────────────────

  /api/v1/admin/roles:
    post:
      tags: [admin]
      summary: Create a role
      operationId: createRole
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleCreate"
      responses:
        "201":
          description: Role created. Emits `RoleCreated` domain event (written to audit log).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: A role with this name already exists.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/admin/roles/{role_id}:
    delete:
      tags: [admin]
      summary: Soft-delete a role
      description: |
        Marks the role as deleted. System roles (`is_system: true`) cannot be deleted.
        Emits a `RoleDeleted` domain event (written to audit log).
      operationId: deleteRole
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: role_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role deleted.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller is not a super user, or the role is a protected system role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "404":
          description: Role not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/v1/admin/roles/{role_id}/permissions:
    post:
      tags: [admin]
      summary: Assign a permission to a role
      description: |
        Creates a `resource:action` `ScopeKey` permission (idempotent creation)
        and links it to the role.
        Emits a `PermissionGranted` domain event (written to audit log).
      operationId: assignPermission
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: role_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PermissionCreate"
            example:
              resource: products
              action: read
      responses:
        "201":
          description: Permission assigned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RolePermissionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Role not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "409":
          description: This permission is already assigned to the role.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/admin/roles/{role_id}/permissions/{scope}:
    delete:
      tags: [admin]
      summary: Revoke a permission from a role
      description: |
        Removes the `resource:action` scope key permission from the role.
        Emits a `PermissionRevoked` domain event (written to audit log).
      operationId: revokePermission
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: role_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: scope
          required: true
          schema:
            type: string
          description: The `resource:action` scope key (e.g. `products:read`).
          example: products:read
      responses:
        "204":
          description: Permission revoked.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: Role or permission not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  /api/v1/admin/users/{user_id}/roles:
    post:
      tags: [admin]
      summary: Assign a role to a user
      description: |
        Creates a `user_roles` association record.
        Emits a `UserRoleAssigned` domain event (written to audit log).
      operationId: assignRoleToUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignRoleRequest"
      responses:
        "201":
          description: Role assigned to user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserRoleResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User or role not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"
        "422":
          $ref: "#/components/responses/UnprocessableEntity"

  /api/v1/admin/users/{user_id}/roles/{role_id}:
    delete:
      tags: [admin]
      summary: Revoke a role from a user
      description: |
        Removes the `user_roles` association record.
        Emits a `UserRoleRevoked` domain event (written to audit log).
      operationId: revokeRoleFromUser
      security:
        - BearerAuth: []
      parameters:
        - in: path
          name: user_id
          required: true
          schema:
            type: string
            format: uuid
        - in: path
          name: role_id
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Role revoked from user.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          description: User or role not found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorDetail"

  # ── Audit ──────────────────────────────────────────────────────────────────

  /api/v1/admin/audit-logs:
    get:
      tags: [admin]
      summary: List audit log entries
      description: |
        Returns a paginated list of immutable audit log entries written by the RBAC
        Unit of Work after each successful operation.
      operationId: getAuditLogs
      security:
        - BearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Paginated audit log entries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuditLogResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
